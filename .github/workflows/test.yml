name: Run Tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1

    steps:
      - uses: actions/checkout@v3

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Run Vitest
        run: cd apps/aura && bun test-vite
